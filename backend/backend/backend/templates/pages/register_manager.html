{% extends "base.html" %}
{% block title %}Inscription crèche — Little Future{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container auth-card auth-card-wide reveal">
        <h1>Inscription responsable de crèche</h1>
        <p class="muted">Votre crèche sera vérifiée avant activation.</p>
        <form id="managerForm" class="form form-grid" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Prénom <input name="first_name" required /></label>
            <label>Nom <input name="last_name" required /></label>
            <label>Adresse email <input type="email" name="email" required /></label>
            <label>Téléphone <input name="phone" /></label>
            <label class="span-2">Adresse de la crèche <input name="address" required /></label>
            <label>Ville <input name="city" /></label>
            <label>Code postal <input name="postal_code" /></label>
            <label>Numéro de licence <input name="license_number" required /></label>
            <label>Carte professionnelle <input type="file" name="professional_card" accept="application/pdf,image/*" /></label>
            <label class="span-2">Services proposés <textarea name="services_offered" rows="3" placeholder="Repas, sieste encadrée, activités artistiques, langues, …"></textarea></label>
            <label>Mot de passe <input type="password" name="password" required minlength="8" /></label>
            <label>Confirmer le mot de passe <input type="password" name="password_confirm" required minlength="8" /></label>
            <button type="submit" class="btn btn-primary btn-xl span-2">Créer le compte crèche</button>
            <div id="managerMsg" class="form-message span-2"></div>
        </form>
    </div>
</section>

<script>
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}
document.getElementById("managerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const msg = document.getElementById("managerMsg");
    msg.textContent = "Envoi…";
    try {
        const csrftoken = getCookie('csrftoken') || formData.get('csrfmiddlewaretoken');
        const res = await fetch("/api/v1/auth/register/manager/", {
            method: "POST",
            headers: {"X-CSRFToken": csrftoken},
            body: formData,
        });
        const body = await res.json();
        if (!res.ok) {
            msg.className = "form-message error";
            msg.textContent = JSON.stringify(body);
            return;
        }
        msg.className = "form-message success";
        msg.textContent = body.message || "Inscription envoyée !";
        e.target.reset();
    } catch (err) {
        msg.className = "form-message error";
        msg.textContent = "Erreur réseau.";
    }
});
</script>
{% endblock %}
